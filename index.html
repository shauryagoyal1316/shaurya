<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shaurya Goyal — Full-Stack Website Builder</title>
    <meta
      name="description"
      content="Shaurya Goyal builds complete websites — front end and back end — that look expensive, work properly, and feel intentional."
    />
    <meta name="author" content="Shaurya Goyal" />
    <meta name="theme-color" content="#EEF0EB" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0D1526" media="(prefers-color-scheme: dark)" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:ital,wdth,wght@0,62..125,300..900;1,62..125,300..900&family=JetBrains+Mono:ital,wght@0,300..600;1,400&family=Architects+Daughter&display=swap"
      rel="stylesheet"
    />

    <meta property="og:title" content="Shaurya Goyal — Full-Stack Website Builder" />
    <meta
      property="og:description"
      content="Complete websites — front end and back end — built with editorial craft."
    />
    <meta property="og:type" content="website" />

    <!--
      No-flash theme bootstrap. Runs synchronously before paint, reads the
      stored preference (or system preference as a fallback), and writes
      data-theme onto <html> so the CSS variables resolve correctly on the
      very first frame instead of flashing the default theme.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('sg-theme');
          var theme =
            stored === 'light' || stored === 'dark'
              ? stored
              : window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light';
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script>
      // When someone double-clicks the repo's index.html from disk, bounce
      // them into dist/index.html so the bundled app actually loads. Skip
      // the bounce when we're already at the built file.
      if (
        window.location.protocol === "file:" &&
        !window.location.pathname.replace(/\\/g, "/").endsWith("/dist/index.html")
      ) {
        window.location.replace(new URL("./dist/index.html", window.location.href));
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
